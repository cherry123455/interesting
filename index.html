<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="一个适合朋友聚会的真心话大冒险网页小游戏，支持玩家轮换、随机抽题和自定义题库。"
    />
    <meta name="theme-color" content="#118a82" />
    <meta property="og:title" content="真心话大冒险" />
    <meta
      property="og:description"
      content="手机浏览器就能玩的聚会小游戏，添加玩家后随机抽真心话或大冒险。"
    />
    <meta property="og:type" content="website" />
    <title>真心话大冒险</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="game-stage" aria-labelledby="app-title">
        <div class="stage-visual" aria-hidden="true">
          <div class="light-beam beam-one"></div>
          <div class="light-beam beam-two"></div>
          <div class="card-stack">
            <div class="mini-card card-a"></div>
            <div class="mini-card card-b"></div>
            <div class="mini-card card-c"></div>
          </div>
          <div class="token token-one"></div>
          <div class="token token-two"></div>
          <div class="spark spark-one"></div>
          <div class="spark spark-two"></div>
          <div class="spark spark-three"></div>
        </div>

        <header class="topbar">
          <div>
            <p class="kicker">Party Round</p>
            <h1 id="app-title">真心话大冒险</h1>
          </div>
          <button class="icon-button" id="reset-game" type="button" title="重置游戏" aria-label="重置游戏">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 12a9 9 0 1 0 3-6.7" />
              <path d="M3 4v6h6" />
            </svg>
          </button>
        </header>

        <section class="current-panel" aria-live="polite">
          <p class="section-label">当前玩家</p>
          <div class="current-player" id="current-player">先添加玩家</div>
          <p class="round-count" id="round-count">第 1 轮</p>
        </section>

        <section class="choice-grid" aria-label="抽题类型">
          <button class="choice-button truth" id="draw-truth" type="button">
            <span class="choice-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M5 5h14v14H5z" />
                <path d="M8 9h8" />
                <path d="M8 13h5" />
              </svg>
            </span>
            <span>真心话</span>
          </button>
          <button class="choice-button dare" id="draw-dare" type="button">
            <span class="choice-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z" />
                <path d="M12 8v5" />
                <path d="M12 16h.01" />
              </svg>
            </span>
            <span>大冒险</span>
          </button>
        </section>

        <section class="question-panel" aria-live="polite">
          <div class="question-meta">
            <span id="question-type">等待抽题</span>
            <span id="question-source">内置题库</span>
          </div>
          <p class="question-text" id="question-text">添加玩家后，选择真心话或大冒险开始。</p>
        </section>

        <div class="action-row">
          <button class="secondary-button" id="next-player" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 12h14" />
              <path d="M13 6l6 6-6 6" />
            </svg>
            下一位
          </button>
          <button class="secondary-button" id="repeat-question" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M17 2l4 4-4 4" />
              <path d="M3 11V9a3 3 0 0 1 3-3h15" />
              <path d="M7 22l-4-4 4-4" />
              <path d="M21 13v2a3 3 0 0 1-3 3H3" />
            </svg>
            再来一题
          </button>
        </div>
      </section>

      <aside class="side-panel" aria-label="游戏设置">
        <section class="setup-block">
          <div class="block-heading">
            <h2>玩家</h2>
            <span id="player-count">0 人</span>
          </div>
          <form class="input-row" id="player-form">
            <label class="sr-only" for="player-name">玩家名字</label>
            <input id="player-name" name="player-name" type="text" placeholder="输入名字" maxlength="12" autocomplete="off" />
            <button class="add-button" type="submit" title="添加玩家" aria-label="添加玩家">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 5v14" />
                <path d="M5 12h14" />
              </svg>
            </button>
          </form>
          <ul class="player-list" id="player-list"></ul>
        </section>

        <section class="setup-block">
          <div class="block-heading">
            <h2>自定义题目</h2>
            <span id="custom-count">0 条</span>
          </div>
          <div class="segmented-control" role="tablist" aria-label="题目类型">
            <button class="segment active" id="custom-truth-tab" type="button" data-custom-type="truth">真心话</button>
            <button class="segment" id="custom-dare-tab" type="button" data-custom-type="dare">大冒险</button>
          </div>
          <form class="custom-form" id="custom-form">
            <label class="sr-only" for="custom-question">自定义题目</label>
            <textarea id="custom-question" name="custom-question" placeholder="写一条你的题目" maxlength="80"></textarea>
            <button class="primary-button" type="submit">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 5v14" />
                <path d="M5 12h14" />
              </svg>
              加入题库
            </button>
          </form>
          <ul class="custom-list" id="custom-list"></ul>
        </section>
      </aside>
    </main>

    <script src="script.js"></script>
  </body>
</html>
